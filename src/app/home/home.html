<section class="search-section">
  <input
    type="text"
    placeholder="Search books, authors..."
    [(ngModel)]="searchTerm"
    (input)="filterBooks()"
  />
</section>

<!-- BOOK LIST -->
<section class="container">
  <div class="grid">
    <div class="card" *ngFor="let book of books;">

      <div class="img">
        <img [src]="book.image" />
      </div>

      <div class="content">
        <h4>{{ book.title }}</h4>
        <p>{{ book.author }}</p>

        <div class="bottom">
          <span>₹{{ book.price }}</span>
          <div style="display: flex; align-items: center;gap: 10px;">
            <button>View</button>
          <img (click)="book.isFavourite ? removeFavourite(book.isFavourite, book?._id): addFavourite(book.isFavourite, book?._id)" [src]="!book.isFavourite ? 'assets/unfavourite.png' : 'assets/favourite.jpg'" alt="" style="height: 20px;width: 20px;cursor: pointer;">
          </div>
        </div>
      </div>

    </div>
  </div>

  <div *ngIf="books.length === 0" class="empty">
    No books found
  </div>
</section>
