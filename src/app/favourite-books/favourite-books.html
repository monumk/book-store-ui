<app-header></app-header>


<!-- BOOK LIST -->
<section class="container">
  <div class="grid">
    <div class="card" *ngFor="let book of books;">

      <div class="img">
        <img [src]="book.image" />
      </div>

      <div class="content">
        <h4>{{ book.title }}</h4>
        <p>{{ book.author }}</p>

        <div class="bottom">
          <span>₹{{ book.price }}</span>
          <div style="display: flex; align-items: center;gap: 10px;">
            <button>View</button>
          <img (click)="removeFavourite(book.isFavourite, book?._id)" src="assets/favourite.jpg" alt="" style="height: 20px;width: 20px;cursor: pointer;">
          </div>
        </div>
      </div>

    </div>
  </div>

  <div *ngIf="books.length === 0" class="empty">
    No books found
  </div>
</section>
